spring:
  application:
    name: barberbook

  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-at-least-256-bits}
    expiration-hours: 8

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/barberbook_dev
    username: postgres
    password: gugulimao
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true

app:
  jwt:
    secret: dev-only-secret-key-nao-usar-em-producao-min32chars
  cors:
    allowed-origins: "*"

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false

app:
  cors:
    allowed-origins: ${FRONTEND_URL}
